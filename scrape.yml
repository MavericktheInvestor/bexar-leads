name: Scrape Bexar County Leads

on:
  schedule:
    - cron: "0 7 * * *"          # 07:00 UTC daily (2 AM CT)
  workflow_dispatch:              # manual trigger

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "scrape"
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      # ── Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Python ──────────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scraper/requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml dbfread playwright

      # ── Playwright ──────────────────────────────────────────────────────
      - name: Install Playwright + Chromium
        run: python -m playwright install --with-deps chromium

      # ── Ensure output dirs exist ─────────────────────────────────────────
      - name: Create output directories
        run: |
          mkdir -p dashboard
          mkdir -p data

      # ── Run scraper ──────────────────────────────────────────────────────
      - name: Run lead scraper
        run: python scraper/fetch.py
        env:
          PYTHONUNBUFFERED: "1"

      # ── Commit results ───────────────────────────────────────────────────
      - name: Commit & push updated records
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard/records.json data/records.json data/leads.csv || true
          git diff --cached --quiet || \
            git commit -m "chore: update leads $(date -u +%Y-%m-%d)"
          git push

      # ── Deploy dashboard to GitHub Pages ─────────────────────────────────
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/

  deploy-pages:
    needs: scrape
    runs-on: ubuntu-22.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
